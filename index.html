<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>3D Modell Viewer</title>
<style>
  :root{
    --bg: #0b0d10;
    --panel: rgba(18,20,24,0.72);
    --text: #e8e6e1;
    --text-dim: #8b9096;
    --accent: #5eead4;
  }
  *{ box-sizing: border-box; }
  html, body{
    margin:0; padding:0; width:100%; height:100%;
    background: var(--bg);
    overflow: hidden;
    overscroll-behavior: none;
    touch-action: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #canvas-wrap{ position: fixed; inset: 0; }
  canvas{ display:block; touch-action: none; }

  #hud{
    position: fixed;
    top: max(14px, env(safe-area-inset-top));
    left: 14px;
    right: 14px;
    display:flex;
    justify-content: space-between;
    align-items:flex-start;
    pointer-events: none;
    z-index: 10;
  }
  #title-block{
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    pointer-events: auto;
    max-width: 62vw;
  }
  #title-block h1{
    margin:0; font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
    white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
  }
  #title-block p{
    margin: 2px 0 0; font-size: 11px; color: var(--text-dim);
  }
  #reset-btn{
    pointer-events: auto;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    border-radius: 12px;
    width: 42px; height: 42px;
    display:flex; align-items:center; justify-content:center;
    font-size: 18px;
    cursor: pointer;
  }
  #reset-btn:active{ background: rgba(94,234,212,0.18); border-color: var(--accent); }

  #upload-btn{
    pointer-events: auto;
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    border-radius: 12px;
    width: 42px; height: 42px;
    display:flex; align-items:center; justify-content:center;
    font-size: 17px;
    cursor: pointer;
    margin-right: 8px;
  }
  #upload-btn:active{ background: rgba(94,234,212,0.18); border-color: var(--accent); }

  #status{
    position: fixed;
    inset: 0;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    gap: 14px;
    background: var(--bg);
    z-index: 20;
    transition: opacity 0.35s ease;
    padding: 24px;
    text-align:center;
  }
  #status.hidden{ opacity:0; pointer-events:none; }
  .spinner{
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.12);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  #status-text{ color: var(--text-dim); font-size: 13px; max-width: 320px; line-height: 1.5; }
  #status-text b{ color: var(--text); }
  #progress-track{
    width: 200px; height: 3px; border-radius: 3px;
    background: rgba(255,255,255,0.1); overflow:hidden;
  }
  #progress-bar{
    height:100%; width:0%; background: var(--accent);
    transition: width 0.15s ease;
  }

  #hint{
    position: fixed;
    bottom: max(16px, env(safe-area-inset-bottom));
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    font-size: 11px;
    padding: 8px 14px;
    border-radius: 999px;
    pointer-events: none;
    z-index: 10;
    transition: opacity 0.6s ease;
    white-space: nowrap;
  }
  #hint.hidden{ opacity: 0; }

  /* ---------- Hotspot-Marker ---------- */
  #hotspot-layer{
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 8;
  }
  .hotspot-marker{
    position: absolute;
    top: 0; left: 0;
    width: 34px; height: 34px;
    margin: -17px 0 0 -17px;
    border-radius: 50%;
    background: rgba(94,234,212,0.16);
    border: 1.5px solid var(--accent);
    color: var(--accent);
    display:flex; align-items:center; justify-content:center;
    font-size: 13px; font-weight: 700;
    pointer-events: auto;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 0 0 0 rgba(94,234,212,0.5);
    animation: pulse 2.2s ease-out infinite;
  }
  .hotspot-marker::after{
    content: "";
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(94,234,212,0.35);
  }
  .hotspot-marker:active{ background: rgba(94,234,212,0.32); }
  @keyframes pulse{
    0%   { box-shadow: 0 0 0 0 rgba(94,234,212,0.45); }
    70%  { box-shadow: 0 0 0 14px rgba(94,234,212,0); }
    100% { box-shadow: 0 0 0 0 rgba(94,234,212,0); }
  }

  /* ---------- Info-Panel ---------- */
  #panel-backdrop{
    position: fixed; inset: 0;
    background: rgba(6,7,9,0.55);
    backdrop-filter: blur(2px);
    z-index: 29;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  #panel-backdrop.visible{ opacity: 1; pointer-events: auto; }

  #hotspot-panel{
    position: fixed;
    left: 50%;
    bottom: max(18px, env(safe-area-inset-bottom));
    transform: translate(-50%, 24px);
    width: min(440px, calc(100% - 28px));
    background: var(--panel);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 18px 18px 16px;
    color: var(--text);
    z-index: 30;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  #hotspot-panel.visible{
    opacity: 1; pointer-events: auto;
    transform: translate(-50%, 0);
  }
  #panel-close{
    position: absolute;
    top: 10px; right: 10px;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.08);
    color: var(--text);
    font-size: 16px;
    cursor: pointer;
    display:flex; align-items:center; justify-content:center;
  }
  #panel-close:active{ background: rgba(255,255,255,0.18); }
  #panel-title{
    margin: 0 34px 8px 0;
    font-size: 15px; font-weight: 700;
    color: var(--accent);
  }
  #panel-text{
    margin: 0 0 14px;
    font-size: 13.5px; line-height: 1.55;
    color: var(--text);
  }
  #panel-audio-row{
    display:flex; align-items:center; gap: 10px;
  }
  #panel-audio-toggle{
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    cursor: pointer;
    display:flex; align-items:center; gap:6px;
  }
  #panel-audio-toggle:active{ background: rgba(94,234,212,0.18); }
  #panel-audio-status{
    font-size: 11px; color: var(--text-dim);
  }

  /* ---------- Debug-Werkzeug (Hotspot-Koordinaten finden) ---------- */
  #debug-toggle{
    pointer-events: auto;
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    border-radius: 12px;
    width: 42px; height: 42px;
    display:flex; align-items:center; justify-content:center;
    font-size: 15px;
    cursor: pointer;
    margin-left: 8px;
  }
  #debug-toggle.active{ color: var(--bg); background: var(--accent); border-color: var(--accent); }

  #debug-readout{
    position: fixed;
    top: max(64px, calc(env(safe-area-inset-top) + 64px));
    left: 14px;
    right: 14px;
    max-height: 40vh;
    overflow-y: auto;
    background: var(--panel);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 11px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    z-index: 15;
    display: none;
    line-height: 1.6;
  }
  #debug-readout.visible{ display:block; }
  #debug-readout .coord-line{
    white-space: nowrap;
    overflow-x: auto;
    color: var(--text-dim);
  }
  #debug-readout .coord-line b{ color: var(--accent); }
</style>
</head>
<body>

<div id="canvas-wrap"></div>

<div id="hud">
  <div id="title-block">
    <h1 id="model-name">Modell wird geladen…</h1>
    <p id="model-meta">&nbsp;</p>
  </div>
  <div style="display:flex; pointer-events:none;">
    <div id="upload-btn" title="Eigene .ply-Datei laden">⭱</div>
    <div id="reset-btn" title="Ansicht zurücksetzen">⟲</div>
    <div id="debug-toggle" title="Hotspot-Koordinaten ermitteln">✛</div>
  </div>
</div>
<input type="file" id="file-input" accept=".ply" style="display:none">

<div id="debug-readout"></div>

<div id="hint">1 Finger drehen · 2 Finger verschieben/zoomen</div>

<div id="hotspot-layer"></div>

<div id="panel-backdrop"></div>
<div id="hotspot-panel">
  <button id="panel-close" title="Schließen">×</button>
  <h2 id="panel-title">Titel</h2>
  <p id="panel-text">Text</p>
  <div id="panel-audio-row">
    <button id="panel-audio-toggle">
      <span id="panel-audio-icon">⏸</span>
      <span id="panel-audio-label">Audio läuft</span>
    </button>
    <span id="panel-audio-status"></span>
  </div>
</div>

<div id="status">
  <div class="spinner"></div>
  <div id="progress-track"><div id="progress-bar"></div></div>
  <div id="status-text">Lade <b id="status-file">Modell</b>…</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.166.1/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.166.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { PLYLoader } from "three/addons/loaders/PLYLoader.js";

/* ============================================================
   KONFIGURATION
   Pfad zum PLY-Modell im Repo. Kann per URL-Parameter
   überschrieben werden: index.html?model=pfad/zu/datei.ply
   ============================================================ */
const DEFAULT_MODEL_PATH = "model.ply";
const params = new URLSearchParams(window.location.search);
const MODEL_PATH = params.get("model") || DEFAULT_MODEL_PATH;

/* ============================================================
   HOTSPOTS
   position: [x, y, z] im lokalen Koordinatensystem des Modells
   (Ursprung = Modellmittelpunkt, unabhängig von der aktuellen
   Kamera-Ansicht). Am einfachsten ermittelst du diese Werte,
   indem du auf der Live-Seite den Debug-Button (✛) oben rechts
   aktivierst und die gewünschten Stellen am Modell antippst –
   die passende Zeile wird dann unten eingeblendet und lässt
   sich direkt hier einfügen.
   ============================================================ */
const HOTSPOTS = [
  {
    id: 1,
    position: [0.3, 0.2, 0.4],
    label: "1",
    title: "Hotspot 1",
    text: "Info-Text zu diesem Bereich des Modells. Hier kannst du Hintergrundwissen, Details oder eine Beschreibung einfügen.",
    audio: "audio/hotspot1.mp3"
  },
  {
    id: 2,
    position: [-0.4, 0.1, -0.2],
    label: "2",
    title: "Hotspot 2",
    text: "Info-Text zu diesem Bereich des Modells.",
    audio: "audio/hotspot2.mp3"
  },
  {
    id: 3,
    position: [0.1, -0.3, 0.2],
    label: "3",
    title: "Hotspot 3",
    text: "Info-Text zu diesem Bereich des Modells.",
    audio: "audio/hotspot3.mp3"
  }
];

const wrap = document.getElementById("canvas-wrap");
const statusEl = document.getElementById("status");
const statusText = document.getElementById("status-file");
const progressBar = document.getElementById("progress-bar");
const modelNameEl = document.getElementById("model-name");
const modelMetaEl = document.getElementById("model-meta");
const resetBtn = document.getElementById("reset-btn");
const hintEl = document.getElementById("hint");
const hotspotLayer = document.getElementById("hotspot-layer");
const panelEl = document.getElementById("hotspot-panel");
const panelBackdrop = document.getElementById("panel-backdrop");
const panelTitle = document.getElementById("panel-title");
const panelText = document.getElementById("panel-text");
const panelClose = document.getElementById("panel-close");
const panelAudioToggle = document.getElementById("panel-audio-toggle");
const panelAudioIcon = document.getElementById("panel-audio-icon");
const panelAudioLabel = document.getElementById("panel-audio-label");
const panelAudioStatus = document.getElementById("panel-audio-status");
const debugToggle = document.getElementById("debug-toggle");
const debugReadout = document.getElementById("debug-readout");

/* ---------- Renderer / Scene / Camera ---------- */
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0d10);

const camera = new THREE.PerspectiveCamera(
  45, window.innerWidth / window.innerHeight, 0.01, 1000
);
camera.position.set(0, 0, 3);

/* ---------- Licht (wirkt zusätzlich zu Vertexfarben) ---------- */
scene.add(new THREE.AmbientLight(0xffffff, 0.9));
const key = new THREE.DirectionalLight(0xffffff, 0.9);
key.position.set(2, 3, 4);
scene.add(key);
const fill = new THREE.DirectionalLight(0xffffff, 0.4);
fill.position.set(-3, -1, -2);
scene.add(fill);

/* ---------- Controls: 1 Finger drehen, 2 Finger verschieben + zoomen ---------- */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.rotateSpeed = 0.9;
controls.zoomSpeed = 0.9;
controls.panSpeed = 0.9;
controls.screenSpacePanning = true;
controls.minDistance = 0.05;
controls.maxDistance = 200;

controls.touches = {
  ONE: THREE.TOUCH.ROTATE,
  TWO: THREE.TOUCH.DOLLY_PAN
};
controls.mouseButtons = {
  LEFT: THREE.MOUSE.ROTATE,
  MIDDLE: THREE.MOUSE.DOLLY,
  RIGHT: THREE.MOUSE.PAN
};

let defaultCamPos = camera.position.clone();
let defaultTarget = controls.target.clone();

resetBtn.addEventListener("click", () => {
  camera.position.copy(defaultCamPos);
  controls.target.copy(defaultTarget);
  controls.update();
});

/* ---------- Resize ---------- */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------- Hotspots: Marker, Panel, Audio ---------- */
let modelMesh = null;
const raycaster = new THREE.Raycaster();
const _worldPos = new THREE.Vector3();
let currentAudio = null;
let activeHotspot = null;

// Marker-DOM-Elemente einmalig erzeugen
HOTSPOTS.forEach((hs) => {
  const el = document.createElement("button");
  el.className = "hotspot-marker";
  el.type = "button";
  el.textContent = hs.label ?? String(hs.id);
  el.setAttribute("aria-label", hs.title || `Hotspot ${hs.id}`);
  el.style.display = "none";
  el.addEventListener("click", (e) => {
    e.stopPropagation();
    openHotspot(hs);
  });
  hotspotLayer.appendChild(el);
  hs.el = el;
});

function updateHotspotMarkers() {
  if (!modelMesh) return;
  camera.updateMatrixWorld();

  HOTSPOTS.forEach((hs) => {
    _worldPos.set(hs.position[0], hs.position[1], hs.position[2]);
    modelMesh.localToWorld(_worldPos);

    const dist = camera.position.distanceTo(_worldPos);
    const dirToPoint = _worldPos.clone().sub(camera.position).normalize();

    // Sichtbarkeit prüfen: hinter der Kamera / außerhalb Sichtfeld / verdeckt
    const ndc = _worldPos.clone().project(camera);
    const behind = ndc.z > 1 || ndc.z < -1;
    const outOfView = ndc.x < -1.1 || ndc.x > 1.1 || ndc.y < -1.1 || ndc.y > 1.1;

    let occluded = false;
    if (!behind && !outOfView) {
      raycaster.set(camera.position, dirToPoint);
      const hits = raycaster.intersectObject(modelMesh, false);
      if (hits.length && hits[0].distance < dist - 0.02) occluded = true;
    }

    if (behind || outOfView || occluded) {
      hs.el.style.display = "none";
    } else {
      hs.el.style.display = "flex";
      const x = (ndc.x * 0.5 + 0.5) * window.innerWidth;
      const y = (1 - (ndc.y * 0.5 + 0.5)) * window.innerHeight;
      hs.el.style.transform = `translate(${x}px, ${y}px)`;
    }
  });
}

function openHotspot(hs) {
  activeHotspot = hs;
  panelTitle.textContent = hs.title || `Hotspot ${hs.id}`;
  panelText.textContent = hs.text || "";
  panelAudioStatus.textContent = "";
  panelAudioToggle.style.display = hs.audio ? "flex" : "none";

  stopAudio();

  if (hs.audio) {
    currentAudio = new Audio(hs.audio);
    currentAudio.addEventListener("ended", () => setAudioUI(false));
    currentAudio.addEventListener("error", () => {
      panelAudioStatus.textContent = "Audiodatei nicht gefunden.";
      panelAudioToggle.style.display = "none";
    });
    currentAudio.play().then(() => setAudioUI(true)).catch(() => {
      // Autoplay evtl. blockiert -> Nutzer muss selbst starten
      setAudioUI(false);
    });
  }

  panelBackdrop.classList.add("visible");
  panelEl.classList.add("visible");
}

function closeHotspot() {
  panelBackdrop.classList.remove("visible");
  panelEl.classList.remove("visible");
  stopAudio();
  activeHotspot = null;
}

function stopAudio() {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    currentAudio = null;
  }
}

function setAudioUI(playing) {
  panelAudioIcon.textContent = playing ? "⏸" : "▶";
  panelAudioLabel.textContent = playing ? "Audio läuft" : "Audio abspielen";
}

panelAudioToggle.addEventListener("click", () => {
  if (!currentAudio) return;
  if (currentAudio.paused) {
    currentAudio.play().then(() => setAudioUI(true)).catch(() => {});
  } else {
    currentAudio.pause();
    setAudioUI(false);
  }
});

panelClose.addEventListener("click", closeHotspot);
panelBackdrop.addEventListener("click", closeHotspot);
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && activeHotspot) closeHotspot();
});

/* ---------- Debug-Werkzeug: Hotspot-Koordinaten per Antippen ermitteln ---------- */
let debugMode = params.get("debug") === "1";
const debugLines = [];

function setDebugMode(on) {
  debugMode = on;
  debugToggle.classList.toggle("active", on);
  debugReadout.classList.toggle("visible", on && debugLines.length > 0);
}
setDebugMode(debugMode);

debugToggle.addEventListener("click", () => setDebugMode(!debugMode));

let pointerStart = null;
renderer.domElement.addEventListener("pointerdown", (e) => {
  pointerStart = { x: e.clientX, y: e.clientY, t: Date.now() };
});
renderer.domElement.addEventListener("pointerup", (e) => {
  if (!debugMode || !modelMesh || !pointerStart) return;
  const moved = Math.hypot(e.clientX - pointerStart.x, e.clientY - pointerStart.y);
  const elapsed = Date.now() - pointerStart.t;
  pointerStart = null;
  if (moved > 8 || elapsed > 500) return; // war ein Drag, kein Tap

  const ndcX = (e.clientX / window.innerWidth) * 2 - 1;
  const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera({ x: ndcX, y: ndcY }, camera);
  const hits = raycaster.intersectObject(modelMesh, false);
  if (!hits.length) return;

  const localPoint = modelMesh.worldToLocal(hits[0].point.clone());
  const rounded = [localPoint.x, localPoint.y, localPoint.z].map(v => Math.round(v * 1000) / 1000);
  const nextId = HOTSPOTS.length + debugLines.length + 1;
  const snippet = `{ id: ${nextId}, position: [${rounded.join(", ")}], label: "${nextId}", title: "…", text: "…", audio: "audio/hotspot${nextId}.mp3" }`;
  debugLines.unshift(snippet);
  if (debugLines.length > 8) debugLines.pop();

  debugReadout.innerHTML = debugLines
    .map(s => `<div class="coord-line">${s.replace(/position/, "<b>position</b>")}</div>`)
    .join("");
  debugReadout.classList.add("visible");
});

/* ---------- Modell laden ---------- */
const loader = new PLYLoader();

function resetLoadingUI(label) {
  statusEl.classList.remove("hidden");
  document.querySelector(".spinner").style.display = "";
  progressBar.parentElement.style.display = "";
  progressBar.style.width = "0%";
  statusText.textContent = label;
  modelNameEl.textContent = "Modell wird geladen…";
  modelMetaEl.textContent = "\u00a0";
}

function disposeCurrentModel() {
  if (!modelMesh) return;
  scene.remove(modelMesh);
  modelMesh.geometry.dispose();
  if (modelMesh.material && modelMesh.material.dispose) modelMesh.material.dispose();
  modelMesh = null;
  if (activeHotspot) closeHotspot();
}

function geometryLooksLikePointCloud(geometry) {
  // Heuristik: keine Normalen und keine Faces -> vermutlich reine Punktwolke
  return !geometry.getAttribute("normal") && !geometry.index;
}

function onGeometryLoaded(geometry, displayName, sourceLabel) {
  disposeCurrentModel();

  geometry.computeVertexNormals();

  const hasColor = !!geometry.getAttribute("color");
  const material = new THREE.MeshStandardMaterial({
    vertexColors: hasColor,
    color: hasColor ? 0xffffff : 0xb9c0c6,
    roughness: 0.85,
    metalness: 0.0,
    flatShading: false,
    side: THREE.DoubleSide
  });

  let mesh;
  const isPointCloud = !geometry.index && (!geometry.groups || geometry.groups.length === 0) && geometryLooksLikePointCloud(geometry);

  if (isPointCloud) {
    const ptMaterial = new THREE.PointsMaterial({
      size: 0.01,
      vertexColors: hasColor,
      color: hasColor ? 0xffffff : 0xb9c0c6,
      sizeAttenuation: true
    });
    mesh = new THREE.Points(geometry, ptMaterial);
  } else {
    mesh = new THREE.Mesh(geometry, material);
  }

  // Zentrieren und normieren
  geometry.computeBoundingBox();
  const bbox = geometry.boundingBox;
  const center = new THREE.Vector3();
  bbox.getCenter(center);
  geometry.translate(-center.x, -center.y, -center.z);

  const size = new THREE.Vector3();
  bbox.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const scale = 1.6 / maxDim;
  mesh.scale.setScalar(scale);

  scene.add(mesh);
  modelMesh = mesh;

  // Kamera passend positionieren
  const dist = 3;
  camera.position.set(dist * 0.6, dist * 0.4, dist * 0.8);
  camera.lookAt(0, 0, 0);
  controls.target.set(0, 0, 0);
  controls.update();
  defaultCamPos = camera.position.clone();
  defaultTarget = controls.target.clone();

  modelNameEl.textContent = displayName;
  const vertCount = geometry.getAttribute("position").count;
  modelMetaEl.textContent = `${vertCount.toLocaleString("de-DE")} Punkte${hasColor ? " · Vertexfarben" : ""} · ${sourceLabel}`;

  statusEl.classList.add("hidden");
  hintEl.classList.remove("hidden");
  setTimeout(() => { hintEl.classList.add("hidden"); }, 4000);
}

function onLoadError(name) {
  return (err) => {
    console.error(err);
    modelNameEl.textContent = "Modell konnte nicht geladen werden";
    document.getElementById("status-text").innerHTML =
      `Datei <b>${name}</b> konnte nicht gelesen werden.<br>` +
      `Prüfe, ob es sich um eine gültige .ply-Datei handelt.`;
    document.querySelector(".spinner").style.display = "none";
    progressBar.parentElement.style.display = "none";
  };
}

function loadFromURL(url) {
  resetLoadingUI(url);
  loader.load(
    url,
    (geometry) => onGeometryLoaded(geometry, url.split("/").pop(), "aus Repo"),
    (xhr) => {
      if (xhr.lengthComputable) {
        progressBar.style.width = Math.round((xhr.loaded / xhr.total) * 100) + "%";
      }
    },
    (err) => {
      console.error(err);
      modelNameEl.textContent = "Modell konnte nicht geladen werden";
      document.getElementById("status-text").innerHTML =
        `Datei <b>${url}</b> nicht gefunden.<br>` +
        `Lege eine .ply-Datei mit diesem Namen ins Repo-Root, rufe die Seite mit ` +
        `<b>?model=deine-datei.ply</b> auf, oder lade eine Datei über den ⭱-Button hoch.`;
      document.querySelector(".spinner").style.display = "none";
      progressBar.parentElement.style.display = "none";
    }
  );
}

function loadFromFile(file) {
  resetLoadingUI(file.name);
  const reader = new FileReader();
  reader.onprogress = (e) => {
    if (e.lengthComputable) {
      progressBar.style.width = Math.round((e.loaded / e.total) * 100) + "%";
    }
  };
  reader.onload = (e) => {
    try {
      const geometry = loader.parse(e.target.result);
      onGeometryLoaded(geometry, file.name, "hochgeladen");
    } catch (err) {
      onLoadError(file.name)(err);
    }
  };
  reader.onerror = () => onLoadError(file.name)(reader.error);
  reader.readAsArrayBuffer(file);
}

/* ---------- Eigene Datei hochladen ---------- */
const uploadBtn = document.getElementById("upload-btn");
const fileInput = document.getElementById("file-input");

uploadBtn.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => {
  const file = fileInput.files && fileInput.files[0];
  if (!file) return;
  loadFromFile(file);
  fileInput.value = ""; // erlaubt erneutes Hochladen derselben Datei
});

// Drag & Drop von .ply-Dateien direkt auf die Seite (Desktop-Komfort)
window.addEventListener("dragover", (e) => e.preventDefault());
window.addEventListener("drop", (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files && e.dataTransfer.files[0];
  if (file && file.name.toLowerCase().endsWith(".ply")) {
    loadFromFile(file);
  }
});

// Startmodell aus dem Repo laden
loadFromURL(MODEL_PATH);

/* ---------- Render-Loop ---------- */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  updateHotspotMarkers();
}
animate();
</script>
</body>
</html>
